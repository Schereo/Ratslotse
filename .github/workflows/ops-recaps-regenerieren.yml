# Manuell auslösbarer Ops-Lauf: generiert alle Themenfeld-Rückblicke neu
# (scripts/generate_field_recaps.py --force). Nützlich nach Änderungen am
# recap_themenfeld-Prompt (admin-editierbar), statt auf den wöchentlichen
# Lauf (So 03:00) zu warten. Kostet je Lauf ein paar Cent LLM (12 Felder).
# Gleiche SSH-Mechanik wie deploy.yml; keine Inputs, nur Collaborator.
name: "Ops: Rückblicke regenerieren"

on:
  workflow_dispatch:

concurrency:
  group: ops-recaps
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Regenerate field recaps on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          proxy_host: ${{ secrets.VPS_PROXY_HOST }}
          proxy_username: ${{ secrets.VPS_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_port: ${{ secrets.VPS_SSH_PORT }}
          command_timeout: 20m
          script: |
            set -e
            cd ~/app
            .venv/bin/python scripts/generate_field_recaps.py --force
            .venv/bin/python - <<'PY'
            from council.store import CouncilStore
            s = CouncilStore("data/council.sqlite")
            recaps = s.get_field_recaps()
            bullets = sum(1 for r in recaps if "\n- " in (r["summary"] or ""))
            print(f"{len(recaps)} Rückblicke · {bullets} im neuen Stichpunkt-Format")
            if recaps:
                probe = recaps[0]["summary"].splitlines()
                print("Kostprobe:", probe[0][:90])
                for line in probe[1:3]:
                    print("  ", line[:90])
            s.close()
            PY
