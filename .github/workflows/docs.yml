name: Docs

# Baut die Starlight-Doku (docs-site/) bei jedem PR und Push auf main.
# Schlägt fehl, wenn die Doku nicht mehr baut (kaputte Links/Frontmatter/MDX)
# — so kann keine PR die Docs unbemerkt zerschießen.

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - run: npm ci
      - run: npm run build
