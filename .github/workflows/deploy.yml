name: Deploy to VPS

on:
  pull_request:
    types: [closed]
    branches: [main]

# Deploys müssen sich strikt abwechseln. Zwei kurz hintereinander gemergte PRs
# starteten sonst zwei Läufe, die gleichzeitig `npm ci` auf demselben Server
# ausführen — und das leert node_modules zu Beginn. Der zweite Lauf zog dem
# ersten so die Abhängigkeiten unter dem laufenden Build weg; zurück blieben
# 25 von 602 Paketen ohne `next`, und ratslotse.de lieferte 502
# (24.07.2026, zwei Merges im Abstand von 17 Sekunden).
# cancel-in-progress bewusst FALSE: Ein halb durchgelaufener Deploy ist genau
# der Zustand, den wir vermeiden wollen — lieber warten.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Sicherheitsnetz vor dem Deploy: derselbe Testlauf wie in test.yml, hier als
  # harte Abhängigkeit. Ein roter Lauf blockiert den Deploy — ein direkt (ohne
  # grünen PR-Check) gemergter Stand kann Produktion nicht mehr erreichen.
  # (Lehre aus dem #154-Ausfall: roter CI wurde gemergt und deployt.)
  test:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -q

  deploy:
    needs: test
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build docs site
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: npm ci + build (docs-site)
        working-directory: docs-site
        run: |
          npm ci
          npm run build

      - name: Deploy via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' \
            'Host edge' \
            "  HostName ${{ secrets.VPS_PROXY_HOST }}" \
            "  User ${{ secrets.VPS_USER }}" \
            "  Port ${{ secrets.VPS_SSH_PORT }}" \
            '  IdentityFile ~/.ssh/id_ed25519' \
            '  StrictHostKeyChecking no' \
            'Host target' \
            "  HostName ${{ secrets.VPS_HOST }}" \
            "  User ${{ secrets.VPS_USER }}" \
            "  Port ${{ secrets.VPS_SSH_PORT }}" \
            '  IdentityFile ~/.ssh/id_ed25519' \
            '  ProxyJump edge' \
            '  StrictHostKeyChecking no' \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config
          rsync -az --delete \
            --exclude '.env' \
            --exclude 'data/' \
            --exclude '.venv/' \
            --exclude '.git/' \
            --exclude 'web/frontend/node_modules/' \
            --exclude 'web/frontend/.next/' \
            --exclude 'web/frontend/public/docs/' \
            --exclude 'docs-site/node_modules/' \
            --exclude 'docs-site/dist/' \
            -e "ssh" \
            ./ target:~/app/

          # Statische Doku nach public/docs des Frontends — Next.js liefert sie
          # unter ratslotse.de/docs aus (Rewrites in next.config.mjs), die Edge
          # braucht dafür keine Konfiguration. Eigenes Verzeichnis -> --delete ok.
          rsync -az --delete \
            -e "ssh" \
            docs-site/dist/ target:~/app/web/frontend/public/docs/

      - name: Restart services and rebuild web
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          proxy_host: ${{ secrets.VPS_PROXY_HOST }}
          proxy_username: ${{ secrets.VPS_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            cd ~/app
            # Backend deps (idempotent) + frontend build, then restart web services.
            .venv/bin/pip install -q -r requirements.txt -r web/backend/requirements.txt
            cd web/frontend && npm ci --no-audit --no-fund && npm run build
            sudo systemctl restart nwz-web-api nwz-web-frontend

            # Erst wenn beide Dienste wirklich antworten, gilt der Deploy als
            # geglückt. Ohne diese Prüfung meldete der Lauf „success", während
            # ratslotse.de längst 502 lieferte (nwz-web-frontend hing in einer
            # Neustart-Schleife, `next: not found`) — der Ausfall fiel erst
            # dadurch auf, dass sich jemand nicht anmelden konnte.
            for i in $(seq 1 30); do
              sleep 2
              if curl -sf -o /dev/null http://127.0.0.1:3000/ \
                 && curl -sf -o /dev/null http://127.0.0.1:8000/api/health; then
                echo "Dienste antworten nach $((i * 2))s."
                exit 0
              fi
            done
            echo "FEHLER: Dienste antworten 60s nach dem Neustart nicht."
            systemctl is-active nwz-web-api nwz-web-frontend || true
            journalctl -u nwz-web-frontend -n 30 --no-pager || true
            exit 1
