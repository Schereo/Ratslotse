name: 💡 Feature vorschlagen
description: Eine Idee oder Verbesserung
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: Welches Problem löst das Feature? Für wen?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Vorgeschlagene Lösung
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativen (optional)
